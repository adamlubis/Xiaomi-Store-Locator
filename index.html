<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xiaomi Store Locator</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Left -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Xiaomi Store Locator</h2>
      </div>

      <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 Cari toko, partner, kota...">
      </div>

      <div class="filter-grid">
        <select id="filter-partner"><option value="">Partner</option></select>
        <select id="filter-region"><option value="">Region</option></select>
        
        <div class="filter-row">
          <select id="filter-province"><option value="">Province</option></select>
          <select id="filter-city"><option value="">City</option></select>
        </div>

        <div class="filter-row">
          <select id="filter-type"><option value="">Type</option></select>
          <select id="filter-status"><option value="">Status</option></select>
        </div>
      </div>

      <div class="stats-bar">
        <span id="store-count">0 toko ditemukan</span>
        <button id="reset-btn" class="reset-link">Reset Filter</button>
      </div>

      <div id="store-list" class="store-list">
        <!-- List toko akan terisi otomatis -->
      </div>
    </aside>

    <!-- Map View -->
    <main id="map"></main>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  
  <script src="script.js"></script>
</body>
</html>
